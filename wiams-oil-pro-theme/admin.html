<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة الأدمن - متجر ويام</title>
    <script type="module" src="/src/admin.js"></script>
  </head>
  <body>
    <div id="adminApp" class="admin-page">
      <header class="site-header admin-header">
        <div class="container header-inner">
          <a href="/" class="brand">
            <span class="brand-badge">W</span>
            <div>
              <h1>لوحة الأدمن</h1>
              <p>إدارة المنتجات والطلبات وإعدادات المتجر</p>
            </div>
          </a>
          <div class="header-actions">
            <a href="/" class="ghost-btn">المتجر</a>
            <button id="logoutButton" class="ghost-btn hidden" type="button">تسجيل خروج</button>
          </div>
        </div>
      </header>

      <main class="container admin-layout">
        <section id="authSection" class="auth-card">
          <h2>دخول الأدمن</h2>
          <p class="muted">ادخل بالإيميل والباسورد الذي أضفته في Supabase Authentication.</p>
          <form id="loginForm" class="stack-form">
            <input name="email" type="email" placeholder="الإيميل" required />
            <input name="password" type="password" placeholder="الباسورد" required />
            <button class="primary-btn full-width" type="submit">دخول</button>
          </form>
        </section>

        <section id="dashboardSection" class="hidden">
          <div class="admin-grid">
            <div class="panel">
              <div class="panel-head">
                <h3>المنتجات</h3>
                <button id="resetProductForm" class="ghost-btn" type="button">منتج جديد</button>
              </div>

              <form id="productForm" class="stack-form">
                <input type="hidden" name="id" />
                <input name="name" type="text" placeholder="اسم المنتج" required />
                <div class="grid-2">
                  <input name="price" type="number" min="0" step="0.01" placeholder="السعر" required />
                  <input name="old_price" type="number" min="0" step="0.01" placeholder="السعر قبل الخصم" />
                </div>
                <input name="category" type="text" placeholder="القسم" required />
                <textarea name="description" placeholder="الوصف"></textarea>
                <input name="image" type="url" placeholder="رابط الصورة" />
                <div class="stack-inline">
                  <input id="imageUpload" type="file" accept="image/*" />
                  <button id="uploadImageBtn" type="button" class="ghost-btn">رفع الصورة إلى Supabase</button>
                </div>
                <div class="grid-2">
                  <input name="stock" type="number" min="0" step="1" placeholder="الكمية" required />
                  <label class="checkbox-row">
                    <input name="sold_out" type="checkbox" />
                    <span>Sold Out يدوي</span>
                  </label>
                </div>
                <div class="stack-inline">
                  <button class="primary-btn" type="submit">حفظ المنتج</button>
                  <button id="deleteProductBtn" class="danger-btn hidden" type="button">حذف المنتج</button>
                </div>
              </form>

              <div id="productsTable" class="table-list"></div>
            </div>

            <div class="panel">
              <div class="panel-head">
                <h3>إعدادات المتجر</h3>
              </div>

              <form id="settingsForm" class="stack-form">
                <input name="store_name" type="text" placeholder="اسم المتجر" />
                <input name="tagline" type="text" placeholder="الجملة القصيرة" />
                <input name="hero_title" type="text" placeholder="عنوان الواجهة" />
                <textarea name="hero_subtitle" placeholder="وصف الواجهة"></textarea>
                <input name="whatsapp_number" type="text" placeholder="رقم واتساب مثال 97059..." />
                <div class="grid-2">
                  <input name="primary_color" type="text" placeholder="اللون الأساسي مثال #8b5e3c" />
                  <input name="accent_color" type="text" placeholder="لون إضافي مثال #d9c1a2" />
                </div>
                <button class="primary-btn" type="submit">حفظ الإعدادات</button>
              </form>

              <div class="panel-head top-gap">
                <h3>الطلبات</h3>
              </div>
              <div id="ordersTable" class="table-list"></div>
            </div>
          </div>
        </section>
      </main>

      <div id="toast" class="toast hidden"></div>
    </div>
  </body>
</html>
